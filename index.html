<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon.png">
    <title>מחשבון Risk/Reward לסחיקה</title>
    <style>
       :root {
            /* מצב בהיר - רציני ונקי */
            --bg-primary: #f4f4f7;
            --bg-secondary: #ffffff;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --input-bg: #ffffff;
            --input-border: #d2d2d7;
            --box-bg: #f5f5f7;
            --accent-color: #0071e3; /* כחול אפל */
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        body.dark-mode {
            /* מצב כהה - מקצועי ודרמטי */
            --bg-primary: #000000;
            --bg-secondary: #1c1c1e;
            --text-primary: #f5f5f7;
            --text-secondary: #a1a1a6;
            --input-bg: #2c2c2e;
            --input-border: #3a3a3c;
            --box-bg: #2c2c2e;
            --accent-color: #0a84ff;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 1.2rem;
            direction: rtl;
            transition: all 0.3s ease;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--bg-secondary);
            padding: 2rem;
            border-radius: 18px;
            box-shadow: var(--shadow);
        }

        .header h1 {
            font-size: 26px;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: var(--text-primary);
        }

        /* עיצוב כפתורים ואינפוטים למראה רציני */
        .input-group input, .currency-select select {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 10px;
            padding: 0.8rem;
            color: var(--text-primary);
            font-size: 16px;
        }

        .input-group input:focus {
            border-color: var(--accent-color);
            outline: none;
            box-shadow: 0 0 0 3px rgba(10, 132, 255, 0.2);
        }

        .result-column {
            border-top: 1px solid var(--input-border);
            padding-top: 1.5rem;
        }

        button#resetBtn {
            background: var(--input-border);
            color: var(--text-primary);
            border-radius: 8px;
            transition: opacity 0.2s;
        }

        button#resetBtn:hover {
            opacity: 0.8;
            transform: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💹 Risk/Reward</h1>
            <div class="header-controls">
                <button class="theme-toggle" id="themeToggle" title="החלף מצב">🌙</button>
                <div class="currency-select">
                    <label>מטבע:</label>
                    <select id="currency">
                        <option value="USD">💵 דולר</option>
                        <option value="ILS">₪ שקל</option>
                        <option value="EUR">€ יורו</option>
                        <option value="GBP">£ פאונד</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="input-section">
            <div class="input-group">
                <label>מחיר קניה</label>
                <input type="number" id="entryPrice" placeholder="0.00" step="0.01">
            </div>
            <div class="input-group">
                <label>Stop Loss</label>
                <input type="number" id="stopLoss" placeholder="0.00" step="0.01">
            </div>
            <div class="input-group">
                <label>סכום סיכון</label>
                <input type="number" id="riskAmount" placeholder="0.00" step="0.01">
            </div>
            <div class="input-group">
                <label>מכפיל (R)</label>
                <input type="number" id="rMultiplier" placeholder="2.0" step="0.1" min="0">
            </div>
        </div>

        <div class="results-grid">
            <div class="result-column">
                <h3>🔽 למטה</h3>
                <div class="result-box">
                    <div class="result-label">כמות</div>
                    <div class="result-value" id="sharesDown">0</div>
                </div>
                <div class="result-box">
                    <div class="result-label">עלויות</div>
                    <div class="result-value" id="costDown">0</div>
                </div>
                <div class="result-box">
                    <div class="result-label">רווח</div>
                    <div class="result-value success" id="profitDown">0</div>
                </div>
                <div class="result-box">
                    <div class="result-label">הפסד</div>
                    <div class="result-value danger" id="lossDown">0</div>
                </div>
            </div>

            <div class="result-column">
                <h3>🔼 למעלה</h3>
                <div class="result-box">
                    <div class="result-label">כמות</div>
                    <div class="result-value" id="sharesUp">0</div>
                </div>
                <div class="result-box">
                    <div class="result-label">עלויות</div>
                    <div class="result-value" id="costUp">0</div>
                </div>
                <div class="result-box">
                    <div class="result-label">רווח</div>
                    <div class="result-value success" id="profitUp">0</div>
                </div>
                <div class="result-box">
                    <div class="result-label">הפסד</div>
                    <div class="result-value danger" id="lossUp">0</div>
                </div>
            </div>
        </div>

        <div class="button-group">
            <button id="resetBtn">ניקוי הכל</button>
        </div>

        <div class="footer">
            ✅ הנתונים נשמרים בטלפון שלך
        </div>
    </div>

    <script>
        const STORAGE_KEYS = {
            entryPrice: 'rrc_entry',
            stopLoss: 'rrc_stop',
            riskAmount: 'rrc_risk',
            rMultiplier: 'rrc_r',
            currency: 'rrc_curr',
            darkMode: 'rrc_dark'
        };

        const inputs = {
            entry: document.getElementById('entryPrice'),
            stop: document.getElementById('stopLoss'),
            risk: document.getElementById('riskAmount'),
            rMult: document.getElementById('rMultiplier'),
            curr: document.getElementById('currency')
        };

        const outputs = {
            sharesDown: document.getElementById('sharesDown'),
            sharesUp: document.getElementById('sharesUp'),
            profitDown: document.getElementById('profitDown'),
            profitUp: document.getElementById('profitUp'),
            costDown: document.getElementById('costDown'),
            costUp: document.getElementById('costUp'),
            lossDown: document.getElementById('lossDown'),
            lossUp: document.getElementById('lossUp')
        };

        const symbols = { USD: '$', ILS: '₪', EUR: '€', GBP: '£' };
        const themeToggle = document.getElementById('themeToggle');

        function loadTheme() {
            const isDark = localStorage.getItem(STORAGE_KEYS.darkMode) === 'true';
            if (isDark) {
                document.body.classList.add('dark-mode');
                themeToggle.textContent = '☀️';
            }
        }

        function toggleTheme() {
            const isDark = document.body.classList.toggle('dark-mode');
            localStorage.setItem(STORAGE_KEYS.darkMode, isDark);
            themeToggle.textContent = isDark ? '☀️' : '🌙';
        }

        function load() {
            inputs.entry.value = localStorage.getItem(STORAGE_KEYS.entryPrice) || '';
            inputs.stop.value = localStorage.getItem(STORAGE_KEYS.stopLoss) || '';
            inputs.risk.value = localStorage.getItem(STORAGE_KEYS.riskAmount) || '';
            inputs.rMult.value = localStorage.getItem(STORAGE_KEYS.rMultiplier) || '';
            inputs.curr.value = localStorage.getItem(STORAGE_KEYS.currency) || 'USD';
        }

        function save() {
            localStorage.setItem(STORAGE_KEYS.entryPrice, inputs.entry.value);
            localStorage.setItem(STORAGE_KEYS.stopLoss, inputs.stop.value);
            localStorage.setItem(STORAGE_KEYS.riskAmount, inputs.risk.value);
            localStorage.setItem(STORAGE_KEYS.rMultiplier, inputs.rMult.value);
            localStorage.setItem(STORAGE_KEYS.currency, inputs.curr.value);
        }

        function calc() {
            const e = parseFloat(inputs.entry.value) || 0;
            const s = parseFloat(inputs.stop.value) || 0;
            const r = parseFloat(inputs.risk.value) || 0;
            const m = parseFloat(inputs.rMult.value) || 0;
            const sym = symbols[inputs.curr.value];

            const rp = Math.abs(e - s);
            const se = rp > 0 ? r / rp : 0;

            if (e > 0 && rp > 0 && m > 0) {
                const sd = Math.floor(se);
                const cd = sd * e;
                const ld = sd * Math.abs(s - e);
                const pd = ld * m;

                outputs.sharesDown.textContent = sd;
                outputs.costDown.textContent = `${cd.toFixed(2)} ${sym}`;
                outputs.lossDown.textContent = `${ld.toFixed(2)} ${sym}`;
                outputs.profitDown.textContent = `${pd.toFixed(2)} ${sym}`;

                const su = Math.ceil(se);
                const cu = su * e;
                const lu = su * Math.abs(s - e);
                const pu = lu * m;

                outputs.sharesUp.textContent = su;
                outputs.costUp.textContent = `${cu.toFixed(2)} ${sym}`;
                outputs.lossUp.textContent = `${lu.toFixed(2)} ${sym}`;
                outputs.profitUp.textContent = `${pu.toFixed(2)} ${sym}`;
            } else {
                Object.values(outputs).forEach(o => o.textContent = '0');
            }
        }

        inputs.entry.addEventListener('input', () => { save(); calc(); });
        inputs.stop.addEventListener('input', () => { save(); calc(); });
        inputs.risk.addEventListener('input', () => { save(); calc(); });
        inputs.rMult.addEventListener('input', () => { save(); calc(); });
        inputs.curr.addEventListener('change', () => { save(); calc(); });
        themeToggle.addEventListener('click', toggleTheme);

        document.getElementById('resetBtn').addEventListener('click', () => {
            Object.values(inputs).forEach(inp => inp.value = '');
            inputs.curr.value = 'USD';
            localStorage.removeItem(STORAGE_KEYS.entryPrice);
            localStorage.removeItem(STORAGE_KEYS.stopLoss);
            localStorage.removeItem(STORAGE_KEYS.riskAmount);
            localStorage.removeItem(STORAGE_KEYS.rMultiplier);
            calc();
        });

        loadTheme();
        load();
        calc();
    </script>
</body>
</html>
